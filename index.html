<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Versorgung Eltern</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f2a45f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Versorgung Eltern">
<link rel="apple-touch-icon" href="icons/icon.png">

<style>
:root{
--bg:#f7f7f7;
--card:#fff;
--text:#111;
--muted:#666;
--primary:#2e7d32;
--secondary:#6b7280;
--danger:#c62828;
--border:#e5e7eb;
}

*{box-sizing:border-box}

body{
margin:0;
padding:16px;
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

.header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:12px
}

.header img{
width:48px;
height:48px
}

.card{
background:#fff;
border:1px solid #e5e7eb;
border-radius:14px;
padding:16px;
margin-bottom:18px
}

label{display:block;margin-top:8px}

input,select{
width:100%;
padding:10px;
margin-top:4px;
border-radius:10px;
border:1px solid #ccc
}

.row{display:flex;gap:10px;flex-wrap:wrap}
.row>*{flex:1}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
color:#fff;
background:#2e7d32
}

button.secondary{background:#6b7280}
button.danger{background:#c62828}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

th,td{
padding:8px;
border-bottom:1px solid #eee
}

.row-actions{
display:flex;
gap:6px
}

.toast{
position:fixed;
bottom:20px;
left:20px;
right:20px;
background:#222;
color:#fff;
padding:12px;
border-radius:10px;
display:none
}
</style>
</head>

<body>

<div class="header">
<img src="icons/icon.png">
<h2>Versorgung Eltern</h2>
</div>

<div class="card">

<div class="row">
<div>
<label>Datum</label>
<input type="date" id="datum">
</div>

<div>
<label>Aufgabe</label>
<select id="aufgabe">
<option>Einkauf</option>
<option>Haushalt</option>
<option>Arztbesuch</option>
<option>Gartenarbeiten</option>
<option>Büro</option>
<option>Handwerker</option>
<option>Versorgung Eltern</option>
<option>Sonstiges</option>
</select>
</div>
</div>

<label>Route</label>
<input id="route" placeholder="z.B Rodenbach → Seligenstadt">

<div class="row">
<div>
<label>Startzeit</label>
<input type="time" id="startzeit">
</div>

<div>
<label>Endzeit</label>
<input type="time" id="endzeit">
</div>
</div>

<div class="row">
<div>
<label>Start KM</label>
<input type="number" id="startkm">
</div>

<div>
<label>Ende KM</label>
<input type="number" id="endkm">
</div>
</div>

<button id="saveBtn">Speichern</button>

</div>

<div class="card">
<h3>Liste</h3>
<table id="table"></table>
</div>

<div id="toast" class="toast"></div>

<script>
const $=id=>document.getElementById(id)

const Storage={
key:"fahrtenbuch",
get(){return JSON.parse(localStorage.getItem(this.key)||"[]")},
save(data){localStorage.setItem(this.key,JSON.stringify(data))}
}

function today(){
return new Date().toISOString().slice(0,10)
}

function duration(s,e){

if(!s||!e)return "-"

let[sh,sm]=s.split(":").map(Number)
let[eh,em]=e.split(":").map(Number)

let start=sh*60+sm
let end=eh*60+em

if(end<start)end+=1440

let d=end-start

return Math.floor(d/60)+" Std "+(d%60)+" Min"
}

function load(){

let rows=Storage.get()

let html="<tr><th>Datum</th><th>Aufgabe</th><th>Route</th><th>KM</th><th>Dauer</th><th></th></tr>"

rows.forEach(r=>{

let km=r.endkm-r.startkm

html+=`
<tr>
<td>${r.datum}</td>
<td>${r.aufgabe}</td>
<td>${r.route}</td>
<td>${km}</td>
<td>${duration(r.startzeit,r.endzeit)}</td>

<td class="row-actions">
<button onclick="removeRow(${r.id})">🗑️</button>
</td>

</tr>
`
})

$("table").innerHTML=html
}

function save(){

let entry={
id:Date.now(),
datum:$("datum").value,
aufgabe:$("aufgabe").value,
route:$("route").value,
startzeit:$("startzeit").value,
endzeit:$("endzeit").value,
startkm:+$("startkm").value,
endkm:+$("endkm").value
}

let arr=Storage.get()
arr.push(entry)
Storage.save(arr)

load()
toast("Gespeichert")
}

function removeRow(id){
let arr=Storage.get().filter(r=>r.id!==id)
Storage.save(arr)
load()
}

function toast(t){
let el=$("toast")
el.textContent=t
el.style.display="block"
setTimeout(()=>el.style.display="none",2000)
}

(function(){
$("datum").value=today()
$("saveBtn").onclick=save
load()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}
})()
</script>

</body>
</html>
