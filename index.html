
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Versorgung Eltern</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f2a45f">

<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f7f7f7;padding:16px;margin:0}
h2,h3{margin-top:0}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>*{flex:1}
input,select{width:100%;padding:8px;margin-top:4px}
button{padding:10px;border:none;border-radius:8px;background:#2e7d32;color:#fff;margin-top:8px;cursor:pointer}
button.secondary{background:#6b7280}
button.danger{background:#c62828}
table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{padding:6px;border-bottom:1px solid #eee}
.actions button{margin-right:4px}
.pill{display:inline-block;background:#eee;padding:4px 8px;border-radius:20px;margin-right:6px;font-size:12px}
.toast{position:fixed;bottom:20px;left:20px;right:20px;background:#222;color:#fff;padding:12px;border-radius:10px;display:none}
</style>
</head>

<body>

<h2>Versorgung Eltern</h2>

<div class="card">
<div class="row">
<div>
<label>Datum</label>
<input type="date" id="datum">
</div>

<div>
<label>Aufgabe</label>
<select id="aufgabe">
<option>Einkauf</option>
<option>Haushalt</option>
<option>Arzt</option>
<option>Garten</option>
<option>Büro</option>
<option>Handwerker</option>
<option>Versorgung Eltern</option>
<option>Sonstiges</option>
</select>
</div>
</div>

<label>Route</label>
<input id="route">

<div class="row">
<div>
<label>Startzeit</label>
<input type="time" id="startzeit">
</div>

<div>
<label>Endzeit</label>
<input type="time" id="endzeit">
</div>
</div>

<div class="row">
<div>
<label>Start KM</label>
<input type="number" id="startkm">
</div>
<div>
<label>Ende KM</label>
<input type="number" id="endkm">
</div>
</div>

<button onclick="save()">Speichern</button>
</div>

<div class="card">
<h3>Suche & Monat</h3>
<div class="row">
<input id="search" placeholder="Suche Route / Aufgabe">
<select id="monthFilter"></select>
</div>
<button onclick="load()" class="secondary">Suchen</button>
<button onclick="resetSearch()" class="secondary">Zurücksetzen</button>
</div>

<div class="card">
<h3>Liste</h3>
<div id="summary"></div>
<table id="table"></table>
<button onclick="window.print()" class="secondary">🖨️ Drucken</button>
<button onclick="exportCSV()">💾 CSV Export</button>
</div>

<div class="card">
<h3>Backup</h3>
<button onclick="backup()">⬇️ Backup JSON</button>
<input type="file" id="restoreFile" accept=".json" style="display:none">
<button onclick="document.getElementById('restoreFile').click()" class="secondary">⬆️ Wiederherstellen</button>
</div>

<div id="toast" class="toast"></div>

<script>

const $=id=>document.getElementById(id)
let editId=null

const Storage={
key:"fahrtenbuch",
get(){return JSON.parse(localStorage.getItem(this.key)||"[]")},
save(data){localStorage.setItem(this.key,JSON.stringify(data))}
}

function today(){
return new Date().toISOString().slice(0,10)
}

function duration(s,e){
if(!s||!e)return 0
let[sh,sm]=s.split(":").map(Number)
let[eh,em]=e.split(":").map(Number)
let start=sh*60+sm
let end=eh*60+em
if(end<start)end+=1440
return end-start
}

function loadMonths(){
let sel=$("monthFilter")
sel.innerHTML=""
let now=new Date()
let current=now.toISOString().slice(0,7)

for(let i=0;i<24;i++){
let d=new Date(now.getFullYear(),now.getMonth()-i,1)
let val=d.toISOString().slice(0,7)
let txt=d.toLocaleString("de-DE",{month:"long",year:"numeric"})
let o=document.createElement("option")
o.value=val
o.textContent=txt
sel.appendChild(o)
}

sel.value=current
}

function load(){

let rows=Storage.get()
let q=$("search").value.toLowerCase()
let m=$("monthFilter").value

if(m){
rows=rows.filter(r=>r.datum.startsWith(m))
}

rows=rows.filter(r=>
!q ||
(r.route||"").toLowerCase().includes(q) ||
(r.aufgabe||"").toLowerCase().includes(q)
)

render(rows)
}

function render(rows){

let html="<tr><th>Datum</th><th>Aufgabe</th><th>Route</th><th>KM</th><th>Dauer</th><th></th></tr>"

let sumKm=0
let sumMin=0

rows.forEach(r=>{

let km=(r.endkm||0)-(r.startkm||0)
let dur=duration(r.startzeit,r.endzeit)

sumKm+=km
sumMin+=dur

html+=`
<tr>
<td>${r.datum}</td>
<td>${r.aufgabe}</td>
<td>${r.route}</td>
<td>${km}</td>
<td>${Math.floor(dur/60)}h ${dur%60}m</td>
<td class="actions">
<button onclick="edit(${r.id})">✏️</button>
<button onclick="removeRow(${r.id})" class="danger">🗑️</button>
</td>
</tr>
`
})

$("table").innerHTML=html

$("summary").innerHTML=
'<span class="pill">Fahrten: '+rows.length+'</span>'+
'<span class="pill">KM: '+sumKm+'</span>'+
'<span class="pill">Zeit: '+Math.floor(sumMin/60)+'h '+sumMin%60+'m</span>'
}

function save(){

let entry={
id:editId??Date.now(),
datum:$("datum").value,
aufgabe:$("aufgabe").value,
route:$("route").value,
startzeit:$("startzeit").value,
endzeit:$("endzeit").value,
startkm:+$("startkm").value,
endkm:+$("endkm").value
}

let arr=Storage.get()

if(editId){
arr=arr.map(x=>x.id===editId?entry:x)
}else{
arr.push(entry)
}

Storage.save(arr)
editId=null
clearForm()
load()
toast("Gespeichert")
}

function edit(id){

let r=Storage.get().find(x=>x.id===id)

$("datum").value=r.datum
$("aufgabe").value=r.aufgabe
$("route").value=r.route
$("startzeit").value=r.startzeit
$("endzeit").value=r.endzeit
$("startkm").value=r.startkm
$("endkm").value=r.endkm

editId=id
}

function removeRow(id){
if(!confirm("Eintrag löschen?")) return
let arr=Storage.get().filter(r=>r.id!==id)
Storage.save(arr)
load()
}

function clearForm(){
$("datum").value=today()
$("route").value=""
$("startzeit").value=""
$("endzeit").value=""
$("startkm").value=""
$("endkm").value=""
}

function exportCSV(){

let rows=Storage.get()
let csv="Datum;Aufgabe;Route;Start;Ende;StartKM;EndKM\n"

rows.forEach(r=>{
csv+=`${r.datum};${r.aufgabe};${r.route};${r.startzeit};${r.endzeit};${r.startkm};${r.endkm}\n`
})

let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="fahrtenbuch.csv"
a.click()
}

function backup(){

let data=JSON.stringify({entries:Storage.get()},null,2)
let blob=new Blob([data])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="backup.json"
a.click()
}

function restore(e){

let file=e.target.files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(){
try{
let json=JSON.parse(reader.result)
if(json.entries){
Storage.save(json.entries)
load()
toast("Wiederhergestellt")
}
}catch{
alert("Ungültige Datei")
}
}

reader.readAsText(file)
}

function resetSearch(){
$("search").value=""
load()
}

function toast(t){
let el=$("toast")
el.textContent=t
el.style.display="block"
setTimeout(()=>el.style.display="none",2000)
}

(function(){

$("datum").value=today()
loadMonths()
load()

$("restoreFile").addEventListener("change",restore)

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

})()

</script>

</body>
</html>
