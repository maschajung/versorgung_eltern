<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Versorgung Eltern</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f2a45f">

<style>
body{font-family:Arial;background:#f7f7f7;padding:16px;margin:0}
h2,h3{margin-top:0}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row>*{flex:1}
input,select,textarea{width:100%;padding:8px;margin-top:4px}
textarea{min-height:60px}
button{padding:10px;border:none;border-radius:8px;background:#2e7d32;color:#fff;margin-top:8px;cursor:pointer}
button.secondary{background:#6b7280}
button.danger{background:#c62828}
table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{padding:6px;border-bottom:1px solid #eee}
.actions button{margin-right:4px}
.pill{display:inline-block;background:#eee;padding:4px 8px;border-radius:20px;margin-right:6px;font-size:12px}
@media print{button,.no-print{display:none} body{background:#fff}}
</style>
</head>

<body>

<h2>Versorgung Eltern</h2>

<button id="installBtn" class="secondary no-print" style="display:none">📱 App installieren</button>

<div class="card">

<div class="row">
<div>
<label>Datum</label>
<input type="date" id="datum">
</div>

<div>
<label>Aufgabe</label>
<select id="aufgabe">
<option>Einkauf</option>
<option>Haushalt</option>
<option>Arzt</option>
<option>Garten</option>
<option>Büro</option>
<option>Handwerker</option>
<option>Versorgung Eltern</option>
<option>Sonstiges</option>
</select>
</div>
</div>

<label>Route</label>
<input id="route">

<div class="row">
<div>
<label>Startzeit</label>
<input type="time" id="startzeit">
</div>

<div>
<label>Endzeit</label>
<input type="time" id="endzeit">
</div>
</div>

<div class="row">
<div>
<label>Start KM</label>
<input type="number" id="startkm">
</div>

<div>
<label>Ende KM</label>
<input type="number" id="endkm">
</div>
</div>

<label>Notizen</label>
<textarea id="notes"></textarea>

<button onclick="save()">Speichern</button>
<button onclick="clearForm()" class="secondary">Zurücksetzen</button>

</div>

<div class="card">

<h3>Suche & Monat</h3>

<div class="row">
<input id="search" placeholder="Route / Aufgabe / Notizen">
<select id="monthFilter"></select>
</div>

<button onclick="load()" class="secondary">Suchen</button>
<button onclick="resetSearch()" class="secondary">Zurücksetzen</button>

</div>

<div class="card">

<h3>Liste</h3>

<div id="summary"></div>
<table id="table"></table>

<button onclick="window.print()" class="secondary">🖨️ Drucken</button>
<button onclick="exportCSV()" class="secondary">CSV Export</button>
<button onclick="backup()" class="secondary">JSON Backup</button>

<input type="file" id="restoreFile" accept=".json" style="display:none">
<button onclick="document.getElementById('restoreFile').click()" class="secondary">JSON Import</button>

</div>

<script>

const $=id=>document.getElementById(id)
let editId=null
let deferredPrompt=null

const Storage={
key:"fahrtenbuch",
get(){return JSON.parse(localStorage.getItem(this.key)||"[]")},
save(data){localStorage.setItem(this.key,JSON.stringify(data))}
}

function today(){return new Date().toISOString().slice(0,10)}

function duration(start,end){

if(!start||!end) return 0

let [sh,sm]=start.split(":").map(Number)
let [eh,em]=end.split(":").map(Number)

let s=sh*60+sm
let e=eh*60+em

if(e<s) e+=1440

return e-s
}

function durationText(min){
return Math.floor(min/60)+" Std "+(min%60)+" Min"
}

function loadMonths(){

let sel=$("monthFilter")
sel.innerHTML=""

let now=new Date()
let cur=now.toISOString().slice(0,7)

for(let i=0;i<24;i++){

let d=new Date(now.getFullYear(),now.getMonth()-i,1)
let val=d.toISOString().slice(0,7)

let txt=d.toLocaleString("de-DE",{month:"long",year:"numeric"})

let o=document.createElement("option")
o.value=val
o.textContent=txt

sel.appendChild(o)

}

sel.value=cur
}

function load(){

let rows=Storage.get()||[]

rows.sort((a,b)=>{

let da = new Date(a.datum || "1970-01-01")
let db = new Date(b.datum || "1970-01-01")

return db-da

})

let q=($("search").value||"").toLowerCase()
let m=$("monthFilter").value

if(m) rows=rows.filter(r=>(r.datum||"").startsWith(m))

if(q){

rows=rows.filter(r=>
(r.route||"").toLowerCase().includes(q) ||
(r.aufgabe||"").toLowerCase().includes(q) ||
(r.notes||"").toLowerCase().includes(q)
)

}

render(rows)

}

function render(rows){

let html="<tr><th>Datum</th><th>Aufgabe</th><th>Route</th><th>KM</th><th>Dauer</th><th>Notizen</th><th></th></tr>"

let sumKm=0
let sumMin=0

rows.forEach(r=>{

let km=(r.endkm||0)-(r.startkm||0)
let dur=duration(r.startzeit,r.endzeit)

sumKm+=km
sumMin+=dur

html+=`
<tr>
<td>${r.datum||""}</td>
<td>${r.aufgabe||""}</td>
<td>${r.route||""}</td>
<td>${km}</td>
<td>${durationText(dur)}</td>
<td>${r.notes||""}</td>
<td class="actions">
<button onclick="edit(${r.id})">✏️</button>
<button onclick="removeRow(${r.id})" class="danger">🗑️</button>
</td>
</tr>
`
})

$("table").innerHTML=html

$("summary").innerHTML=
'<span class="pill">Fahrten: '+rows.length+'</span>'+
'<span class="pill">KM: '+sumKm+'</span>'+
'<span class="pill">Zeit: '+durationText(sumMin)+'</span>'
}

function save(){

let entry={
id:editId??Date.now(),
datum:$("datum").value,
aufgabe:$("aufgabe").value,
route:$("route").value,
startzeit:$("startzeit").value,
endzeit:$("endzeit").value,
startkm:+$("startkm").value,
endkm:+$("endkm").value,
notes:$("notes").value
}

let arr=Storage.get()

if(editId){
arr=arr.map(x=>x.id===editId?entry:x)
}else{
arr.push(entry)
}

Storage.save(arr)
editId=null
clearForm()
load()

}

function edit(id){

let r=Storage.get().find(x=>x.id===id)

$("datum").value=r.datum
$("aufgabe").value=r.aufgabe
$("route").value=r.route
$("startzeit").value=r.startzeit
$("endzeit").value=r.endzeit
$("startkm").value=r.startkm
$("endkm").value=r.endkm
$("notes").value=r.notes||""

editId=id
}

function removeRow(id){

if(!confirm("Eintrag löschen?"))return

let arr=Storage.get().filter(r=>r.id!==id)
Storage.save(arr)

load()

}

function clearForm(){

$("datum").value=today()
$("route").value=""
$("startzeit").value=""
$("endzeit").value=""
$("startkm").value=""
$("endkm").value=""
$("notes").value=""

}

function backup(){

let data=JSON.stringify({entries:Storage.get()},null,2)

let blob=new Blob([data])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="backup.json"
a.click()

}

function restore(e){

let file=e.target.files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(){

try{

let json=JSON.parse(reader.result)

if(json.entries){
Storage.save(json.entries)
load()
}

}catch{
alert("Ungültige Datei")
}

}

reader.readAsText(file)

}

function resetSearch(){

$("search").value=""
load()

}

(function(){

$("datum").value=today()
loadMonths()
load()

$("restoreFile").addEventListener("change",restore)

})()

</script>

</body>
</html>
